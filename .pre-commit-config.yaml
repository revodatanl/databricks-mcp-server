# Pre-commit hooks for linting and security
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # ── General hygiene ──────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-json
        exclude: tsconfig\..*\.json$
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-merge-conflict
      - id: debug-statements
      - id: detect-private-key

  # ── Python lint + format (Ruff) ──────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.14
    hooks:
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # ── Bandit (Python security linter) ──────────────────────────
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.2
    hooks:
      - id: bandit
        args:
          - -c
          - pyproject.toml
          - --quiet
        additional_dependencies: ["bandit[toml]"]
        files: ^src/
        exclude: ^tests/

  # ── Secrets detection ────────────────────────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args:
          - --baseline
          - .secrets.baseline
        exclude: (\.env\.example|package-lock\.json|uv\.lock)$

  # ── uv audit (dependency vulnerability scanning) ─────────────
  - repo: local
    hooks:
      - id: uv-audit
        name: uv audit (dependency vulnerabilities)
        entry: uv-audit
        language: system
        files: (pyproject\.toml|requirements.*\.txt|uv\.lock)$
        pass_filenames: false
        verbose: true

  # ── Gitleaks (hardcoded secret detection) ────────────────────
  - repo: local
    hooks:
      - id: gitleaks
        name: gitleaks
        description: Detect hardcoded secrets using locally-installed gitleaks.
        entry: gitleaks protect --staged --redact
        language: system
        pass_filenames: false

ci:
  autofix_commit_msg: "style: auto-fix by pre-commit hooks"
  autoupdate_commit_msg: "chore: update pre-commit hooks"
